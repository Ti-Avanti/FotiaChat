# FotiaChat 中文语言文件

# 消息前缀
prefix: "<!i><gradient:#FF6B6B:#4ECDC4>[FotiaChat]</gradient> "

# 通用消息
general:
  reload-success: "<!i><green>配置文件已重新加载!"
  no-permission: "<!i><red>你没有权限执行此命令!"
  player-only: "<!i><red>此命令只能由玩家执行!"
  invalid-args: "<!i><red>无效的参数! 用法: {usage}"
  player-not-found: "<!i><red>找不到玩家: {player}"
  player-offline: "<!i><red>玩家 {player} 不在线!"

# 聊天相关消息
chat:
  muted: "<!i><red>你已被禁言，无法发送消息!"
  mute-expired: "<!i><green>你的禁言已解除，现在可以发送消息了!"
  cooldown: "<!i><red>发送消息太快了! 请等待 {time} 后再试!"
  empty-message: "<!i><red>不能发送空消息!"
  message-too-long: "<!i><red>消息太长了! 最大长度: {max}"

# 管理命令消息
admin:
  mute-success: "<!i><green>已禁言玩家 {player}，时长: {duration}"
  unmute-success: "<!i><green>已解除玩家 {player} 的禁言!"
  not-muted: "<!i><yellow>玩家 {player} 没有被禁言!"
  clear-chat: "<!i><gray>聊天记录已被 {player} 清空!"
  mute-exempt: "<!i><red>玩家 {player} 拥有禁言豁免权限!"

# 频道相关消息
channel:
  current: "<!i><gray>你当前的频道: <white>{channel}</white>"
  switched: "<!i><green>已切换到频道: <white>{channel}</white>"
  not-found: "<!i><red>找不到频道: {channel}"
  no-permission: "<!i><red>你没有权限使用此频道!"
  list-header: "<!i><gray>可用频道列表:"
  list-item: "<!i><gray>- <white>{channel}</white> ({shortcut})"

# 颜色相关消息
color:
  current: "<!i><gray>你当前的聊天颜色: {color}"
  help: "<!i><gray>用法: /chatcolor <颜色ID|list|reset>"
  set-success: "<!i><green>已设置聊天颜色为: {color}"
  reset: "<!i><green>已重置为默认聊天颜色!"
  not-found: "<!i><red>找不到颜色: {color}"
  no-permission: "<!i><red>你没有权限使用颜色: {color}"
  list-header: "<!i><gray>========== 可用颜色列表 =========="
  list-item: "<!i><gray>- {name} <dark_gray>({id})</dark_gray> {preview}"
  list-footer: "<!i><gray>=================================="
  no-colors-available: "<!i><yellow>没有可用的颜色!"

# 屏蔽词相关消息
filter:
  blocked: "<!i><red>你的消息包含敏感词，已被阻止发送!"
  warning: "<!i><yellow>请注意文明用语!"

# 私聊相关消息
privatemsg:
  format-sender: "<!i><gray>[<gold>我</gold> -> <white>{target}</white>]</gray> {message}"
  format-receiver: "<!i><gray>[<white>{sender}</white> -> <gold>我</gold>]</gray> {message}"
  self: "<!i><red>你不能给自己发送私聊!"
  no-reply-target: "<!i><red>没有可回复的对象!"
  target-offline: "<!i><red>对方已离线!"
  socialspy-enabled: "<!i><green>已开启私聊监听模式!"
  socialspy-disabled: "<!i><yellow>已关闭私聊监听模式!"
  socialspy-format: "<!i><dark_gray>[监听] <gray>{sender}</gray> -> <gray>{target}</gray>:</dark_gray> {message}"

# 跨服通信相关消息
crossserver:
  chat-format: "<!i><dark_gray>[{server}]</dark_gray> <gray>[{channel}]</gray> <white>{player}</white><gray>:</gray> {message}"
  broadcast-format: "<!i><dark_gray>[{server}]</dark_gray> <gold>{message}</gold>"

# 公告相关消息
announcement:
  sent: "<!i><green>已发送公告: {id}"
  not-found: "<!i><red>找不到公告: {id}"
  broadcast-success: "<!i><green>已广播消息!"
  toggle-enabled: "<!i><green>已开启自动公告!"
  toggle-disabled: "<!i><yellow>已关闭自动公告!"
  reloaded: "<!i><green>公告配置已重载!"
  list-header: "<!i><gray>========== 公告列表 =========="
  list-item: "<!i><gray>- {id} [{status}] (间隔: {interval}秒)"
  usage-send: "<!i><red>用法: /announcement send <公告ID>"
  usage-broadcast: "<!i><red>用法: /announcement broadcast <消息>"
  help-header: "<!i><gray>========== 公告命令帮助 =========="
  help-send: "<!i><gray>/announcement send <ID> - 发送指定公告"
  help-broadcast: "<!i><gray>/announcement broadcast <消息> - 广播自定义消息"
  help-list: "<!i><gray>/announcement list - 列出所有公告"
  help-toggle: "<!i><gray>/announcement toggle - 开关自动公告"
  help-reload: "<!i><gray>/announcement reload - 重载公告配置"

# Premium模块相关消息
premium:
  not-installed: "<!i><red>此功能需要安装 FotiaChat-Premium 模块才能使用!"
  feature-disabled: "<!i><red>{feature} 功能未启用!"

# 物品展示相关消息
item-display:
  no-permission: "<!i><red>你没有权限展示物品!"
  view-no-permission: "<!i><red>你没有权限查看他人的背包/末影箱!"
  snapshot-expired: "<!i><red>该快照已过期!"
  inventory-title: "<!i>{player} 的背包"
  enderchest-title: "<!i>{player} 的末影箱"
