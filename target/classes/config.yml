# FotiaChat 配置文件
# 高级聊天管理插件

# 语言设置
# 可选: zh_CN, en_US
language: zh_CN

# 调试模式
# 开启后会输出更多日志信息
debug: false

# 数据存储设置
storage:
  # 存储类型: memory(内存) 或 mysql(数据库)
  # 使用mysql可以跨服同步玩家的频道和颜色设置
  type: memory
  # MySQL配置 (当type为mysql时使用)
  mysql:
    host: localhost
    port: 3306
    database: fotiachat
    username: root
    password: ''
    # 连接池大小
    pool-size: 10

# 聊天设置
chat:
  # 注意: 聊天格式在 channels.yml 中配置
  # 每个频道可以有独立的格式、悬浮文本和点击事件
  # 是否允许玩家在消息中使用颜色代码
  allow-color-codes: true

# 禁言设置
mute:
  # 权限禁言功能
  # 拥有此权限的玩家将被禁言（无法发送聊天消息）
  # 留空则禁用此功能
  permission: ""

# 跨服通信设置
cross-server:
  # 是否启用跨服通信
  enabled: false
  # 通信类型: redis 或 bungeecord
  type: bungeecord
  # 当前服务器名称
  server-name: server1
  # Redis配置 (当type为redis时使用)
  redis:
    host: localhost
    port: 6379
    password: ''
  # 服务器组配置
  # 可以将多个服务器分组，实现组内聊天同步
  server-groups:
    # 示例: 所有服务器
    all:
      - server1
      - server2
      - server3
    # 示例: 生存服务器组
    survival:
      - survival1
      - survival2
