# FotiaChat 颜色选择菜单
# GUI配置文件
#
# 物品显示配置说明:
#   material: 原版物品材质
#   craftengine-item: CraftEngine自定义物品ID（可选，优先于material）
#                     格式: namespace:item_id
#   item_model: 物品模型（1.21.4+）
#   model_data: CustomModelData值（用于旧版资源包）
#   tooltip: 提示框样式（1.21.4+）
#   name: 物品名称
#   lore: 物品描述

Title: '<!i><gradient:#FF6B6B:#4ECDC4>聊天颜色选择</gradient>'

Layout:
  - '#########'
  - '#abcdefg#'
  - '#hijklmn#'
  - '#opqrstu#'
  - '####x####'

Icons:
  '#':
    display:
      material: 'GRAY_STAINED_GLASS_PANE'
      name: '<!i><dark_gray> '
      lore: []
    actions:
      left,right:
        actions: []

  'a':
    display:
      material: 'WHITE_DYE'
      name: '<!i><white>白色</white>'
      lore:
        - '<!i><gray>点击选择此颜色'
        - ''
        - '<!i><white>预览: 这是白色文字</white>'
    actions:
      left,right:
        actions:
          - 'sound: BLOCK_NOTE_BLOCK_PLING-1-2'
          - 'set_color: white'
          - 'refresh'

