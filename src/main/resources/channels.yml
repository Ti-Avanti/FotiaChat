# FotiaChat 频道配置文件
# 说明:
# 1. format 用于控制 {channel}、{player}、{message} 三个部分的显示顺序
# 2. hover/channel/player/message 可分别设置不同部分的显示文本与悬浮文本
# 3. click/channel/player/message 可分别设置不同部分的点击事件
# 4. display 与 text 支持 MiniMessage、{player}、{channel}、{message}、PlaceholderAPI
# 5. 旧版 hover.enabled + hover.text 与 click.enabled + click.action + click.value 仍然兼容

channels:
  global:
    name: "公共"
    type: PUBLIC
    format: "<!i>{channel} {player}<gray>:</gray> {message}"
    shortcut: "!"
    default: true
    hover:
      channel:
        display: "<!i><gray>[<white>公共</white>]</gray>"
        text:
          - "<!i><gray>频道: <white>{channel}</white></gray>"
          - "<!i><gray>全服公共聊天频道</gray>"
      player:
        display: "<!i><white>{player}</white>"
        text:
          - "<!i><gray>玩家: <white>%player_name%</white></gray>"
          - "<!i><gray>点击私聊该玩家</gray>"
      # message:
      #   display: "{message}"
      #   text:
      #     - "<!i><gray>消息内容: <white>{message}</white></gray>"
    click:
      player:
        enabled: true
        action: SUGGEST_COMMAND
        value: "/msg {player} "
      # channel:
      #   enabled: true
      #   action: SUGGEST_COMMAND
      #   value: "/channel global"

  local:
    name: "本地"
    type: LOCAL
    format: "<!i>{channel} {player}<gray>:</gray> {message}"
    shortcut: "#"
    radius: 100
    default: false
    hover:
      channel:
        display: "<!i><gray>[<yellow>本地</yellow>]</gray>"
        text:
          - "<!i><yellow>本地频道</yellow>"
          - "<!i><gray>仅附近玩家可见</gray>"
      player:
        display: "<!i><white>{player}</white>"
        text:
          - "<!i><gray>玩家: <white>%player_name%</white></gray>"
          - "<!i><gray>点击私聊该玩家</gray>"
    click:
      player:
        enabled: true
        action: SUGGEST_COMMAND
        value: "/msg {player} "

  admin:
    name: "管理"
    type: ADMIN
    format: "<!i>{channel} {player}<gray>:</gray> {message}"
    permission: "fotiachat.channel.admin"
    shortcut: "@"
    default: false
    hover:
      channel:
        display: "<!i><gray>[<red>管理</red>]</gray>"
        text:
          - "<!i><red>管理频道</red>"
          - "<!i><gray>仅管理员可使用</gray>"
      player:
        display: "<!i><white>{player}</white>"
        text:
          - "<!i><gray>管理员: <red>%player_name%</red></gray>"
          - "<!i><gray>点击查看玩家信息</gray>"
    click:
      player:
        enabled: true
        action: RUN_COMMAND
        value: "/playerinfo {player}"

  help:
    name: "求助"
    type: HELP
    format: "<!i>{channel} {player}<gray>:</gray> {message}"
    permission: "fotiachat.channel.help"
    shortcut: "?"
    default: false
    hover:
      channel:
        display: "<!i><gray>[<aqua>求助</aqua>]</gray>"
        text:
          - "<!i><aqua>求助频道</aqua>"
          - "<!i><gray>用于提问和请求帮助</gray>"
      player:
        display: "<!i><white>{player}</white>"
        text:
          - "<!i><gray>玩家: <white>%player_name%</white></gray>"
          - "<!i><aqua>点击帮助该玩家</aqua>"
    click:
      player:
        enabled: true
        action: SUGGEST_COMMAND
        value: "/tp {player}"
