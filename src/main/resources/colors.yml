# FotiaChat 颜色配置文件
# 聊天颜色设置

# 默认颜色ID
# 玩家未选择颜色时使用此颜色
default-color: white

# 颜色列表
# 每个颜色包含以下配置:
#   name: 显示名称
#   type: 颜色类型 (SINGLE/GRADIENT/RAINBOW)
#   format: 颜色格式
#     - SINGLE类型: MiniMessage颜色标签，如 <red>, <#FF5555>
#     - GRADIENT类型: 渐变色参数，如 red:blue, #FF0000:#0000FF
#     - RAINBOW类型: 无需配置format
#   permission: 使用权限 (留空表示所有人可用)
colors:
  # 基础颜色
  white:
    name: "<!i><white>白色</white>"
    type: SINGLE
    format: "<white>"
    permission: ""

  gray:
    name: "<!i><gray>灰色</gray>"
    type: SINGLE
    format: "<gray>"
    permission: ""

  red:
    name: "<!i><red>红色</red>"
    type: SINGLE
    format: "<red>"
    permission: "fotiachat.color.red"

  green:
    name: "<!i><green>绿色</green>"
    type: SINGLE
    format: "<green>"
    permission: "fotiachat.color.green"

  blue:
    name: "<!i><blue>蓝色</blue>"
    type: SINGLE
    format: "<blue>"
    permission: "fotiachat.color.blue"

  yellow:
    name: "<!i><yellow>黄色</yellow>"
    type: SINGLE
    format: "<yellow>"
    permission: "fotiachat.color.yellow"

  gold:
    name: "<!i><gold>金色</gold>"
    type: SINGLE
    format: "<gold>"
    permission: "fotiachat.color.gold"

  aqua:
    name: "<!i><aqua>青色</aqua>"
    type: SINGLE
    format: "<aqua>"
    permission: "fotiachat.color.aqua"

  light_purple:
    name: "<!i><light_purple>粉色</light_purple>"
    type: SINGLE
    format: "<light_purple>"
    permission: "fotiachat.color.light_purple"

  # 渐变颜色
  sunset:
    name: "<!i><gradient:#FF6B6B:#FFE66D>日落渐变</gradient>"
    type: GRADIENT
    format: "#FF6B6B:#FFE66D"
    permission: "fotiachat.color.gradient.sunset"

  ocean:
    name: "<!i><gradient:#667eea:#764ba2>海洋渐变</gradient>"
    type: GRADIENT
    format: "#667eea:#764ba2"
    permission: "fotiachat.color.gradient.ocean"

  forest:
    name: "<!i><gradient:#11998e:#38ef7d>森林渐变</gradient>"
    type: GRADIENT
    format: "#11998e:#38ef7d"
    permission: "fotiachat.color.gradient.forest"

  fire:
    name: "<!i><gradient:#f12711:#f5af19>火焰渐变</gradient>"
    type: GRADIENT
    format: "#f12711:#f5af19"
    permission: "fotiachat.color.gradient.fire"

  ice:
    name: "<!i><gradient:#74ebd5:#ACB6E5>冰霜渐变</gradient>"
    type: GRADIENT
    format: "#74ebd5:#ACB6E5"
    permission: "fotiachat.color.gradient.ice"

  # 彩虹颜色
  rainbow:
    name: "<!i><rainbow>彩虹色</rainbow>"
    type: RAINBOW
    format: ""
    permission: "fotiachat.color.rainbow"
